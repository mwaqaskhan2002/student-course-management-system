{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>
      {% block title %}
      {% endblock %}
    </title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Student Portal</a>

        <button class="navbar-expand-lg navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav gap-2">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'students:student_list' %}"><i class="bi bi-people-fill"></i> Students</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'students:department_list' %}"><i class="bi bi-building"></i> Departments</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'students:course_list' %}"><i class="bi bi-book-fill"></i> Course</a>
            </li>
          </ul>
        </div>

        <form method="GET" action="{{ request.path }}" class="d-flex mx-auto col-12 col-lg-3 my-2 my-lg-0">
          <div class="input-group">
            <input type="text" name="search" class="form-control rounded-start-2 border-secondary-subtle" placeholder="Search here..." value="{{ request.GET.search|default:'' }}" aria-label="Search" />

            {% if request.GET.department %}
              <input type="hidden" name="department" value="{{ request.GET.department }}" />
            {% endif %}
            {% if request.GET.order_by %}
              <input type="hidden" name="order_by" value="{{ request.GET.order_by }}" />
            {% endif %}

            <button class="btn btn-primary rounded-end-3 px-3" type="submit"><i class="bi bi-search"></i></button>
          </div>
        </form>
      </div>
    </nav>
    {% block content %}

    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
